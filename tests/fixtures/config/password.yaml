defaults:
  stdout_high_watermark_bytes: 262144
  stderr_high_watermark_bytes: 262144
  stdin_low_watermark_bytes: 65536

profiles:
  staging:
    host: staging.example.com
    port: 22
    theme: catppuccin-mocha
    auth:
      method: password
      username: deploy
      password_command: pass show zssh/staging
      use_agent: false
