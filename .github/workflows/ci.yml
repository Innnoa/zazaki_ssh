name: ci

on:
  push:
  pull_request:

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            configure_args: -DZSSH_BUILD_TESTS=ON
          - os: windows-latest
            configure_args: >-
              -DZSSH_BUILD_TESTS=ON
              -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
              -DVCPKG_TARGET_TRIPLET=x64-windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install libssh (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssh-dev
      - name: Install libssh (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vcpkgCommit = '38a77589121bd7ec6487927b79c191a75d4ebdd6'
          $vcpkgRoot = Join-Path $env:RUNNER_TEMP 'vcpkg'
          git clone https://github.com/microsoft/vcpkg $vcpkgRoot
          git -C $vcpkgRoot checkout $vcpkgCommit
          & "$vcpkgRoot/bootstrap-vcpkg.bat"
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          & "$vcpkgRoot/vcpkg.exe" install libssh:x64-windows
      - name: Configure
        run: cmake -S . -B build ${{ matrix.configure_args }}
      - name: Build
        run: cmake --build build --config Release
      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure
